version: "3.8"
services:
  app:
    image: your-app-image  # Replace with your actual image name
    ports:
      - "3000:3000"  # Or the port your app uses
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}  # Configure encryption key via environment variable. Generate a strong key.
    volumes:
      - .:/app  # Mount the current directory into the container (for development)
    # Add any other necessary configurations here